name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: frontend

      - name: Lint with Ruff
        run: uv run ruff check backend/ frontend/app.py
        working-directory: frontend

      - name: Format check with Ruff
        run: uv run ruff format --check backend/ frontend/app.py
        working-directory: frontend

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: frontend

      - name: Run unit tests
        run: uv run pytest ../backend/tests/ -v --tb=short --ignore=../backend/tests/test_integration.py
        working-directory: frontend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Run integration tests
        run: uv run pytest ../backend/tests/test_integration.py -v --tb=short
        working-directory: frontend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            frontend/.pytest_cache/
          retention-days: 7
